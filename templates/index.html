<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --morado-principal: #4f46e5;
            --morado-oscuro: #3730a3;
            --amarillo-opaco: #eab308;
        }
        body { font-family: 'Proxima Nova', sans-serif; }
        .product-card:hover { 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2); 
            transform: translateY(-4px);
        }
        .product-img { height: 180px; object-fit: contain; padding: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .admin-trigger {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 60;
        }

        .titulo-remarcado {
            color: rgba(31, 41, 55, 0.9);
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .subtitulo-opaco {
            color: rgba(107, 114, 128, 0.6);
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1f2937]">

    <button onclick="loginAdmin()" class="admin-trigger group flex items-center gap-2 bg-white/80 backdrop-blur-sm p-2 px-3 rounded-full shadow-md hover:bg-white transition-all border border-gray-200" title="Panel de Control">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600 group-hover:rotate-12 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500 group-hover:text-indigo-600">Admin</span>
    </button>

    <nav class="bg-indigo-700 pt-6 pb-2 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-4">
                <div class="flex-shrink-0 cursor-pointer text-center md:text-left" onclick="resetPagina()">
                    <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-tight">
                        Mercado <br>
                        <span class="text-yellow-400 text-xs font-bold tracking-[0.3em] uppercase opacity-90">Feria Neuquén</span>
                    </h1>
                </div>
                <div class="flex-grow max-w-2xl w-full relative">
                    <input type="text" id="buscador" placeholder="Busca artesanías, tecnología y más..." 
                        class="w-full py-3 px-5 rounded-full shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 border-none bg-indigo-600/50 text-white placeholder-indigo-200">
                    <button class="absolute right-5 top-3.5 text-indigo-200">🔍</button>
                </div>
            </div>
            
            <div class="flex justify-start md:justify-center gap-4 overflow-x-auto hide-scroll pb-2">
                <button onclick="resetPagina()" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Todo</button>
                <button onclick="seleccionarCategoria('Tecnología')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Tech</button>
                <button onclick="seleccionarCategoria('Vehículos')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Autos</button>
                <button onclick="seleccionarCategoria('Hogar')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Hogar</button>
                <button onclick="seleccionarCategoria('Moda')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Moda</button>
                <button onclick="seleccionarCategoria('Herramientas')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Herramientas</button>
                <button onclick="seleccionarCategoria('Arte')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Arte</button>
                <button onclick="seleccionarCategoria('Mascotas')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Mascotas</button>
                <button onclick="seleccionarCategoria('Deporte')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Deporte</button>
                <button onclick="seleccionarCategoria('Libros')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Libros</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-6">
        <a href="https://wa.me/5492996256110?text=Hola! Me interesa poner mi puesto virtual en la Feria Neuquén." target="_blank" class="group block w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black text-center py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg transition-all transform hover:scale-[1.01]">
            🚀 ¿Querés vender tus productos acá? Unite a la Feria hoy mismo
        </a>
    </div>

    <div class="container mx-auto px-4 max-w-6xl mt-10">
        
        <div id="seccion-admin" class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-2 border-indigo-50 hidden">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-indigo-900">
                <span class="bg-indigo-100 p-2 rounded-lg">🛠️</span>
                Panel de Administración
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Nombre del Producto</label>
                    <input id="nombre" type="text" placeholder="Ej: Artesanía en madera de Roble" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 transition">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Categoría</label>
                    <select id="categoria" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 bg-white">
                        <option value="Tecnología">Tecnología</option>
                        <option value="Vehículos">Vehículos</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Arte">Arte</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Libros">Libros</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Precio ARS</label>
                    <input id="precio" type="number" placeholder="$ 0.00" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400">
                </div>
                <div class="md:col-span-3 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Imagen del producto</label>
                    <input id="archivo" type="file" accept="image/*" class="w-full border-2 border-dashed border-gray-200 p-2 rounded-xl text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Descripción</label>
                    <textarea id="descripcion" rows="3" placeholder="Contanos más detalles sobre lo que vendés..." class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400"></textarea>
                </div>
                <div class="md:col-span-4 flex justify-end pt-4">
                    <button onclick="guardar()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-xl transition shadow-lg hover:shadow-indigo-200 transform hover:-translate-y-1">
                        Publicar Producto
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h2 id="titulo-seccion" class="text-5xl titulo-remarcado">Productos</h2>
            <p class="text-2xl subtitulo-opaco mt-[-5px]">más recientes</p>
        </div>
        
        <div id="lista" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-24"></div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-hidden rounded-3xl shadow-2xl relative flex flex-col">
            <button onclick="cerrarModal()" class="absolute top-5 right
