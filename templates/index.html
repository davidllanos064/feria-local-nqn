<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --morado-principal: #4f46e5;
            --morado-oscuro: #3730a3;
            --amarillo-opaco: #eab308;
        }
        body { font-family: 'Proxima Nova', sans-serif; }
        .product-card:hover { 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2); 
            transform: translateY(-4px);
        }
        .product-img { height: 180px; object-fit: contain; padding: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .admin-trigger {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 60;
        }

        .titulo-remarcado {
            color: rgba(31, 41, 55, 0.9);
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .subtitulo-opaco {
            color: rgba(107, 114, 128, 0.6);
            font-weight: 700;
        }
        /* Estilo para la galería */
        .miniatura-activa { border-color: #4f46e5 !important; opacity: 1 !important; }
        .miniatura { opacity: 0.6; transition: all 0.2s; }
        .miniatura:hover { opacity: 1; }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1f2937]">

    <button onclick="loginAdmin()" class="admin-trigger group flex items-center gap-2 bg-white/80 backdrop-blur-sm p-2 px-3 rounded-full shadow-md hover:bg-white transition-all border border-gray-200" title="Panel de Control">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600 group-hover:rotate-12 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500 group-hover:text-indigo-600">Admin</span>
    </button>

    <nav class="bg-indigo-700 pt-6 pb-2 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-4">
                <div class="flex-shrink-0 cursor-pointer text-center md:text-left" onclick="resetPagina()">
                    <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-tight">
                        Mercado <br>
                        <span class="text-yellow-400 text-xs font-bold tracking-[0.3em] uppercase opacity-90">Feria Neuquén</span>
                    </h1>
                </div>
                <div class="flex-grow max-w-2xl w-full relative">
                    <input type="text" id="buscador" placeholder="Busca artesanías, tecnología y más..." 
                        class="w-full py-3 px-5 rounded-full shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 border-none bg-indigo-600/50 text-white placeholder-indigo-200">
                    <button class="absolute right-5 top-3.5 text-indigo-200">🔍</button>
                </div>
            </div>
            
            <div class="flex justify-start md:justify-center gap-4 overflow-x-auto hide-scroll pb-2">
                <button onclick="resetPagina()" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Todo</button>
                <button onclick="seleccionarCategoria('Tecnología')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Tech</button>
                <button onclick="seleccionarCategoria('Vehículos')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Autos</button>
                <button onclick="seleccionarCategoria('Hogar')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Hogar</button>
                <button onclick="seleccionarCategoria('Moda')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Moda</button>
                <button onclick="seleccionarCategoria('Herramientas')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Herramientas</button>
                <button onclick="seleccionarCategoria('Arte')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Arte</button>
                <button onclick="seleccionarCategoria('Mascotas')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Mascotas</button>
                <button onclick="seleccionarCategoria('Deporte')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Deporte</button>
                <button onclick="seleccionarCategoria('Libros')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Libros</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-6">
        <a href="https://wa.me/5492996256110?text=Hola! Me interesa poner mi puesto virtual en la Feria Neuquén." target="_blank" class="group block w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black text-center py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg transition-all transform hover:scale-[1.01]">
            🚀 ¿Querés vender tus productos acá? Unite a la Feria hoy mismo
        </a>
    </div>

    <div class="container mx-auto px-4 max-w-6xl mt-10">
        <div id="seccion-admin" class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-2 border-indigo-50 hidden">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-indigo-900">
                <span class="bg-indigo-100 p-2 rounded-lg">🛠️</span>
                Panel de Administración Multivendedor
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Nombre del Producto</label>
                    <input id="nombre" type="text" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 transition">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Categoría</label>
                    <select id="categoria" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 bg-white">
                        <option value="Tecnología">Tecnología</option>
                        <option value="Vehículos">Vehículos</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Arte">Arte</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Libros">Libros</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Precio ARS</label>
                    <input id="precio" type="number" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400">
                </div>

                <div class="md:col-span-2 space-y-2 border-t pt-4">
                    <label class="text-xs font-black text-orange-400 uppercase tracking-tighter">Nombre del Vendedor / Local</label>
                    <input id="v_nombre" type="text" placeholder="Ej: Juan Pérez - Puesto 42" class="w-full border-2 border-gray-100 p-3 rounded-xl">
                </div>
                <div class="md:col-span-1 space-y-2 border-t pt-4">
                    <label class="text-xs font-black text-orange-400 uppercase tracking-tighter">WhatsApp (Sin +)</label>
                    <input id="v_whatsapp" type="text" placeholder="549299..." class="w-full border-2 border-gray-100 p-3 rounded-xl">
                </div>
                <div class="md:col-span-1 space-y-2 border-t pt-4">
                    <label class="text-xs font-black text-orange-400 uppercase tracking-tighter">Ubicación</label>
                    <input id="v_ubicacion" type="text" placeholder="Neuquén Capital" class="w-full border-2 border-gray-100 p-3 rounded-xl">
                </div>

                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-green-500 uppercase tracking-tighter">CBU / CVU</label>
                    <input id="v_cbu" type="text" class="w-full border-2 border-gray-100 p-3 rounded-xl">
                </div>
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-green-500 uppercase tracking-tighter">Alias</label>
                    <input id="v_alias" type="text" class="w-full border-2 border-gray-100 p-3 rounded-xl">
                </div>

                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Fotos (Hasta 5 imágenes)</label>
                    <input id="archivos" type="file" accept="image/*" multiple class="w-full border-2 border-dashed border-gray-200 p-4 rounded-xl text-sm">
                </div>
                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Descripción</label>
                    <textarea id="descripcion" rows="3" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400"></textarea>
                </div>
                <div class="md:col-span-4 flex justify-end pt-4">
                    <button onclick="guardar()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-xl transition shadow-lg transform hover:-translate-y-1">
                        Publicar Producto
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h2 id="titulo-seccion" class="text-5xl titulo-remarcado">Productos</h2>
            <p class="text-2xl subtitulo-opaco mt-[-5px]">más recientes</p>
        </div>
        
        <div id="lista" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-24"></div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-indigo-900/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-[32px] overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
            
            <div class="md:w-1/2 bg-gray-50 p-6 flex flex-col justify-center items-center border-r relative">
                <button onclick="cerrarModal()" class="absolute top-4 left-4 md:hidden text-gray-400 text-2xl">✕</button>
                <img id="modal-img-principal" src="" class="max-h-[350px] object-contain drop-shadow-xl transition-all duration-300">
                <div id="galeria-miniaturas" class="flex gap-2 mt-6 overflow-x-auto p-2 w-full justify-center">
                    </div>
            </div>

            <div class="md:w-1/2 p-10 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <span id="modal-cat" class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest"></span>
                    <button onclick="cerrarModal()" class="hidden md:block text-gray-400 hover:text-black text-2xl transition">✕</button>
                </div>
                
                <h2 id="modal-nombre" class="text-4xl font-black text-gray-900 leading-tight mb-2"></h2>
                <p id="modal-precio" class="text-3xl font-light text-indigo-600 mb-6"></p>
                
                <div class="bg-gray-50 p-4 rounded-2xl mb-6">
                    <p class="text-xs font-bold text-gray-400 uppercase mb-2 tracking-tighter">Descripción del producto</p>
                    <p id="modal-desc" class="text-gray-600 leading-relaxed text-sm"></p>
                </div>

                <div class="border-t pt-6 space-y-4">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center font-bold text-white text-xl shadow-lg" id="vendedor-inicial">F</div>
                        <div>
                            <p class="text-sm font-black text-gray-900" id="vendedor-nombre"></p>
                            <p class="text-xs text-gray-500" id="vendedor-ubicacion"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 gap-3">
                        <a id="btn-whatsapp" target="_blank" class="flex items-center justify-center gap-3 bg-[#25D366] text-white py-4 rounded-2xl font-bold hover:scale-[1.02] transition shadow-lg shadow-green-200">
                            <span class="text-xl">💬</span> Contactar Vendedor
                        </a>
                        
                        <button onclick="mostrarDatosPago()" class="flex items-center justify-center gap-3 bg-black text-white py-4 rounded-2xl font-bold hover:bg-gray-800 transition">
                            <span>🏦</span> Datos de Transferencia
                        </button>

                        <div id="info-pago" class="hidden bg-yellow-50 border-2 border-yellow-200 p-4 rounded-2xl animate-pulse">
                            <p class="text-[10px] font-bold text-yellow-700 uppercase mb-1">CBU/CVU:</p>
                            <p id="pago-cbu" class="text-xs font-mono font-bold text-gray-800 mb-2"></p>
                            <p class="text-[10px] font-bold text-yellow-700 uppercase mb-1">Alias:</p>
                            <p id="pago-alias" class="text-xs font-mono font-bold text-gray-800"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = '/productos'; 
    let categoriaActual = '';
    let isAdmin = false;

    function loginAdmin() {
        const pass = prompt("Acceso Restringido. Ingrese la clave:");
        if (pass === 'neuquen2026') {
            isAdmin = true;
            document.getElementById('seccion-admin').classList.remove('hidden');
            cargar(categoriaActual);
        } else {
            alert("Clave incorrecta.");
        }
    }

    async function cargar(cat = '', busqueda = '') {
        try {
            let url = `${API_URL}?`;
            if(cat) url += `categoria=${cat}&`;
            if(busqueda) url += `busqueda=${busqueda}`;
            const res = await fetch(url);
            const productos = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = ''; 
            
            productos.forEach(p => {
                const precioFormateado = new Intl.NumberFormat('es-AR', {
                    style: 'currency', currency: 'ARS', minimumFractionDigits: 0
                }).format(p.precio);

                const btnEliminar = isAdmin ? `
                    <button onclick="eliminarProducto(event, '${p.id}')" class="absolute top-3 right-3 bg-red-500 text-white p-2 rounded-full hover:bg-red-700 transition shadow-md z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>` : '';

                // Usamos la primera imagen de la lista para la portada
                const portada = p.imagenes.length > 0 ? p.imagenes[0] : 'https://via.placeholder.com/300?text=Sin+Foto';

                const divProducto = document.createElement('div');
                divProducto.className = "product-card bg-white rounded-2xl overflow-hidden flex flex-col h-full border border-gray-100 transition-all cursor-pointer group relative";
                divProducto.onclick = () => verDetalle(p);
                divProducto.innerHTML = `
                    ${btnEliminar}
                    <div class="p-2 flex items-center justify-center bg-white relative">
                        <span class="absolute top-3 left-3 text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase tracking-widest">${p.categoria}</span>
                        <img src="${portada}" class="product-img w-full">
                    </div>
                    <div class="p-5 flex flex-col flex-grow bg-white">
                        <h3 class="text-sm font-semibold text-gray-500 truncate mb-1">${p.nombre}</h3>
                        <span class="text-2xl font-bold text-gray-900 tracking-tight mb-3">${precioFormateado}</span>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">📍 ${p.vendedor.ubicacion}</p>
                    </div>`;
                div.appendChild(divProducto);
            });
        } catch (e) { console.error("Error:", e); }
    }

    async function eliminarProducto(event, id) {
        event.stopPropagation();
        if(!confirm("¿Estás seguro?")) return;
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            cargar(categoriaActual);
        } catch (e) { alert("Error."); }
    }

    async function guardar() {
        const archivos = document.getElementById('archivos').files;
        if(archivos.length === 0) return alert("Subí al menos una foto.");

        const formData = new FormData();
        formData.append('nombre', document.getElementById('nombre').value);
        formData.append('precio', document.getElementById('precio').value);
        formData.append('categoria', document.getElementById('categoria').value);
        formData.append('descripcion', document.getElementById('descripcion').value);
        
        // Datos Vendedor
        formData.append('vendedor_nombre', document.getElementById('v_nombre').value);
        formData.append('vendedor_whatsapp', document.getElementById('v_whatsapp').value);
        formData.append('vendedor_ubicacion', document.getElementById('v_ubicacion').value);
        formData.append('vendedor_cbu', document.getElementById('v_cbu').value);
        formData.append('vendedor_alias', document.getElementById('v_alias').value);

        // Agregamos las múltiples fotos
        for (let i = 0; i < archivos.length; i++) {
            formData.append('imagenes', archivos[i]);
        }

        try {
            const res = await fetch(API_URL, { method: 'POST', body: formData });
            if(res.ok) location.reload();
            else alert("Error al publicar.");
        } catch (e) { console.error(e); }
    }

    function verDetalle(p) {
        document.getElementById('modal-nombre').innerText = p.nombre;
        document.getElementById('modal-cat').innerText = p.categoria;
        document.getElementById('modal-desc').innerText = p.descripcion;
        document.getElementById('modal-precio').innerText = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(p.precio);
        
        // Vendedor
        document.getElementById('vendedor-nombre').innerText = p.vendedor.nombre;
        document.getElementById('vendedor-ubicacion').innerText = `📍 ${p.vendedor.ubicacion}`;
        document.getElementById('vendedor-inicial').innerText = p.vendedor.nombre.charAt(0).toUpperCase();
        
        // WhatsApp
        const msg = `Hola! Me interesa tu producto "${p.nombre}" en la Feria Neuquén.`;
        document.getElementById('btn-whatsapp').href = `https://wa.me/${p.vendedor.whatsapp}?text=${encodeURIComponent(msg)}`;

        // Pago
        document.getElementById('pago-cbu').innerText = p.vendedor.cbu || 'No disponible';
        document.getElementById('pago-alias').innerText = p.vendedor.alias || 'No disponible';
        document.getElementById('info-pago').classList.add('hidden');

        // Galería
        const principal = document.getElementById('modal-img-principal');
        const galeria = document.getElementById('galeria-miniaturas');
        principal.src = p.imagenes[0];
        
        galeria.innerHTML = p.imagenes.map((img, i) => `
            <img src="${img}" onclick="cambiarFoto('${img}', this)" 
                 class="miniatura w-12 h-12 object-cover rounded-lg cursor-pointer border-2 border-transparent ${i===0?'miniatura-activa':''}">
        `).join('');

        document.getElementById('modal-detalle').classList.remove('hidden');
    }

    function cambiarFoto(src, el) {
        document.getElementById('modal-img-principal').src = src;
        document.querySelectorAll('.miniatura').forEach(m => m.classList.remove('miniatura-activa'));
        el.classList.add('miniatura-activa');
    }

    function mostrarDatosPago() {
        document.getElementById('info-pago').classList.toggle('hidden');
    }

    function cerrarModal() { document.getElementById('modal-detalle').classList.add('hidden'); }
    function seleccionarCategoria(cat) { categoriaActual = cat; cargar(cat); }
    function resetPagina() { categoriaActual = ''; cargar(); }
    document.getElementById('buscador').addEventListener('input', (e) => cargar(categoriaActual, e.target.value));
    window.onload = () => cargar();
    </script>
</body>
</html>
