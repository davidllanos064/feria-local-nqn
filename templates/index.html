<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Proxima Nova', sans-serif; scroll-behavior: smooth; }
        .product-card:hover { box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2); transform: translateY(-4px); }
        .product-img { height: 180px; object-fit: contain; padding: 10px; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .admin-trigger { position: absolute; top: 1rem; right: 1rem; z-index: 60; }
        .btn-adopcion { background: linear-gradient(135deg, #f472b6 0%, #db2777 100%); animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); } }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1f2937]">

    <button onclick="reproducirSonido('click'); loginAdmin()" class="admin-trigger group flex items-center gap-2 bg-white/80 backdrop-blur-sm p-2 px-3 rounded-full shadow-md hover:bg-white transition-all border border-gray-200">
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500 group-hover:text-indigo-600">Admin</span>
    </button>

    <nav class="bg-indigo-700 pt-6 pb-2 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl flex flex-col md:flex-row items-center justify-between gap-6 mb-6">
            <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-tight cursor-pointer" onclick="resetPagina()">Mercado <br><span class="text-yellow-400 text-xs font-bold tracking-[0.3em] uppercase">Feria Neuquén</span></h1>
            
            <div class="flex-grow max-w-xl w-full relative">
                <input type="text" id="buscador" oninput="filtrarProductos()" placeholder="Busca artesanías..." class="w-full py-3 px-5 rounded-full shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 border-none bg-indigo-600/50 text-white placeholder-indigo-200">
                <button class="absolute right-5 top-3.5 text-indigo-200">🔍</button>
            </div>

            <div class="flex items-center gap-3">
                <a href="https://petneuquen.streamlit.app/" target="_blank" class="text-[10px] text-white font-black uppercase tracking-wider px-4 py-2.5 rounded-full btn-adopcion transition-all shadow-md">🐾 ADOPCIÓN</a>
                <button onclick="abrirRegistro()" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-950 px-5 py-2 rounded-full font-black text-xs uppercase shadow-md">Registrarse</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-6">
        <div id="contenedor-categorias" class="flex justify-start items-center gap-2 overflow-x-auto no-scrollbar pb-4 border-b border-indigo-200">
            <button onclick="resetPagina()" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-[11px] font-bold uppercase whitespace-nowrap">Todas</button>
            <button onclick="seleccionarCategoria('Tecnología')" class="bg-white px-4 py-2 rounded-full text-[11px] font-bold uppercase whitespace-nowrap border hover:bg-indigo-50">Tecnología</button>
            <button onclick="seleccionarCategoria('Hogar')" class="bg-white px-4 py-2 rounded-full text-[11px] font-bold uppercase whitespace-nowrap border hover:bg-indigo-50">Hogar</button>
            <button onclick="seleccionarCategoria('Moda')" class="bg-white px-4 py-2 rounded-full text-[11px] font-bold uppercase whitespace-nowrap border hover:bg-indigo-50">Moda</button>
            <button onclick="seleccionarCategoria('Mascotas')" class="bg-white px-4 py-2 rounded-full text-[11px] font-bold uppercase whitespace-nowrap border hover:bg-indigo-50">Mascotas</button>
        </div>
    </div>

    <div class="container mx-auto px-4 max-w-6xl mt-10">
        <div id="seccion-admin" class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-2 border-indigo-50 hidden">
            <h2 class="text-2xl font-bold mb-6 text-indigo-900">🛠️ Panel de Control</h2>
            <button onclick="verUsuarios()" class="bg-gray-800 text-white p-3 rounded-lg text-xs font-bold uppercase hover:bg-black transition">Ver Usuarios Registrados</button>
            <div id="lista-usuarios" class="mt-4 bg-gray-50 p-4 rounded-xl min-h-[50px] border"></div>
        </div>

        <h2 id="titulo-seccion" class="text-5xl font-black text-gray-800">Productos</h2>
        <div id="lista" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6 mt-8 mb-24"></div>
    </div>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        const API_URL = '/productos';

        function reproducirSonido(tipo) {
            const audio = document.getElementById('snd-click');
            audio.currentTime = 0; audio.play().catch(() => {});
        }

        // Nueva función para filtrar productos visualmente con el buscador
        function filtrarProductos() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.product-card');
            tarjetas.forEach(tarjeta => {
                const nombreProducto = tarjeta.querySelector('h3').textContent.toLowerCase();
                tarjeta.style.display = nombreProducto.includes(busqueda) ? '' : 'none';
            });
        }

        async function cargar(cat = '') {
            let url = cat ? `${API_URL}?categoria=${cat}` : API_URL;
            const res = await fetch(url);
            const productos = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = '';
            productos.forEach(p => {
                div.innerHTML += `
                    <div class="product-card bg-white rounded-2xl p-4 border border-gray-100">
                        <h3 class="font-semibold text-sm">${p.nombre}</h3>
                        <p class="text-indigo-600 font-bold">$${p.precio}</p>
                    </div>`;
            });
        }

        function seleccionarCategoria(cat) {
            document.getElementById('titulo-seccion').innerText = cat;
            cargar(cat);
        }

        async function verUsuarios() {
            try {
                const res = await fetch('/usuarios');
                const lista = await res.json();
                let html = '<h3 class="font-bold mb-2">Usuarios:</h3>';
                lista.forEach(u => html += `<div class="p-2 border-b text-sm">${u.nombre} - <b>${u.tipo}</b></div>`);
                document.getElementById('lista-usuarios').innerHTML = html;
            } catch (e) { alert("Error al conectar con el servidor"); }
        }

        async function abrirRegistro() {
            reproducirSonido('click');
            const nombre = prompt("Ingresá tu nombre:");
            const tipo = prompt("¿Sos Vendedor o Comprador?");
            if (nombre && tipo) {
                const usuario = { nombre, tipo, fecha: new Date().toISOString() };
                localStorage.setItem('usuario', JSON.stringify(usuario));
                await fetch('/registrar', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(usuario) 
                });
                alert("¡Bienvenido/a " + nombre + "!");
                window.location.href = "/dashboard";
            }
        }

        function loginAdmin() {
            const pass = prompt("Clave de Admin:");
            if (pass === 'neuquen2026') document.getElementById('seccion-admin').classList.remove('hidden');
        }

        function resetPagina() { 
            document.getElementById('titulo-seccion').innerText = 'Productos';
            document.getElementById('buscador').value = '';
            cargar(); 
        }
        
        window.onload = () => cargar();
    </script>
</body>
</html>
