<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Proxima Nova', sans-serif; }
        .product-card:hover { 
            box-shadow: 0 7px 16px 0 rgba(0,0,0,.11); 
            transform: translateY(-2px);
        }
        .product-img { height: 180px; object-fit: contain; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .skeleton {
            background-color: #e5e7eb;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-[#ebebeb] text-[#333]">

    <nav class="bg-[#fff159] pt-3 pb-2 shadow-sm border-b border-gray-300 sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="flex items-center justify-between gap-8">
                <div class="flex-shrink-0 cursor-pointer" onclick="resetPagina()">
                    <h1 class="text-[#03318c] text-2xl font-bold italic leading-tight">Mercado <br><span class="text-xs font-normal not-italic tracking-widest uppercase">Feria Neuquén</span></h1>
                </div>
                <div class="flex-grow max-w-2xl relative">
                    <input type="text" id="buscador" placeholder="Buscar productos..." class="w-full py-2 px-4 rounded-sm shadow-sm text-sm focus:outline-none border-none">
                    <button class="absolute right-3 top-2 text-gray-400">🔍</button>
                    <button onclick="loginAdmin()" class="ml-4 text-[#03318c] hover:bg-white/20 p-2 rounded-full transition" title="Administración">
    ⚙️
</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-8">
        
        <div class="flex justify-start md:justify-center gap-6 mb-10 overflow-x-auto hide-scroll pb-2">
            <div onclick="seleccionarCategoria('Tecnología')" class="flex flex-col items-center gap-2 cursor-pointer group min-w-[70px]">
                <div class="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center group-hover:shadow-md transition text-2xl">📱</div>
                <span class="text-xs text-gray-600 font-medium">Tecnología</span>
            </div>
            <div onclick="seleccionarCategoria('Vehículos')" class="flex flex-col items-center gap-2 cursor-pointer group min-w-[70px]">
                <div class="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center group-hover:shadow-md transition text-2xl">🚗</div>
                <span class="text-xs text-gray-600 font-medium">Vehículos</span>
            </div>
            <div onclick="seleccionarCategoria('Hogar')" class="flex flex-col items-center gap-2 cursor-pointer group min-w-[70px]">
                <div class="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center group-hover:shadow-md transition text-2xl">🏠</div>
                <span class="text-xs text-gray-600 font-medium">Hogar</span>
            </div>
            <div onclick="seleccionarCategoria('Moda')" class="flex flex-col items-center gap-2 cursor-pointer group min-w-[70px]">
                <div class="w-14 h-14 bg-white rounded-full shadow-sm flex items-center justify-center group-hover:shadow-md transition text-2xl">👕</div>
                <span class="text-xs text-gray-600 font-medium">Moda</span>
            </div>
            <div onclick="resetPagina()" class="flex flex-col items-center gap-2 cursor-pointer group min-w-[70px]">
                <div class="w-14 h-14 bg-gray-200 rounded-full shadow-sm flex items-center justify-center group-hover:shadow-md transition text-[10px] font-bold">TODOS</div>
                <span class="text-xs text-gray-600 font-medium">Ver todo</span>
            </div>
        </div>

        <<div id="seccion-admin" class="bg-white p-6 rounded-md shadow-sm mb-10 border border-gray-200 hidden">
    <h2 class="text-xl font-semibold mb-6 border-b pb-2 flex items-center gap-2">
        <span>Panel de Control</span>
        <span class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full uppercase tracking-tighter">Modo Editor</span>
    </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase">¿Qué vas a publicar?</label>
                    <input id="nombre" type="text" placeholder="Ej: PlayStation 5" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-400">
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase">Categoría</label>
                    <select id="categoria" class="w-full border p-2 rounded text-sm bg-white outline-none focus:border-blue-400">
                        <option value="Tecnología">Tecnología</option>
                        <option value="Vehículos">Vehículos</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase">Precio final</label>
                    <input id="precio" type="number" placeholder="$" class="w-full border p-2 rounded text-sm outline-none focus:border-blue-400">
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase">Imagen</label>
                    <input id="archivo" type="file" accept="image/*" class="w-full border p-1 rounded bg-gray-50 text-[10px]">
                </div>
                
                <div class="md:col-span-4 space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase">Descripción detallada</label>
                    <textarea id="descripcion" rows="2" placeholder="Describe el estado, marca o detalles..." class="w-full border p-2 rounded text-sm outline-none focus:border-blue-400"></textarea>
                </div>

                <div class="md:col-span-4 flex justify-end">
                    <button onclick="guardar()" class="bg-[#3483fa] hover:bg-blue-600 text-white font-semibold py-2 px-8 rounded transition shadow-sm h-[42px] text-sm">
                        Publicar ahora
                    </button>
                </div>
            </div>
        </div>

        <h2 id="titulo-seccion" class="text-2xl font-light mb-6">Inspirado en lo último que viste</h2>
        
        <div id="lista" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-20"></div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-lg shadow-xl relative flex flex-col md:flex-row">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10 text-2xl">✕</button>
            <div class="md:w-1/2 p-6 flex items-center justify-center bg-gray-50">
                <img id="modal-img" src="" class="max-h-[400px] object-contain">
            </div>
            <div class="md:w-1/2 p-8 flex flex-col">
                <span id="modal-cat" class="text-xs text-blue-600 font-bold uppercase tracking-widest mb-2"></span>
                <h2 id="modal-nombre" class="text-2xl font-bold text-gray-800 mb-4"></h2>
                <span id="modal-precio" class="text-4xl font-light text-gray-900 mb-6"></span>
                <div class="border-t pt-6 mb-8">
                    <h4 class="font-bold text-gray-700 mb-2">Descripción</h4>
                    <p id="modal-desc" class="text-gray-600 text-sm leading-relaxed"></p>
                </div>
                <a id="btn-whatsapp" target="_blank" class="mt-auto bg-[#00a650] text-white text-center py-4 rounded-md font-bold hover:bg-green-700 transition duration-300 shadow-lg">
                    Contactar al vendedor
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8080/productos';
        let categoriaActual = '';
        function loginAdmin() {
    // 1. Abre un cuadro de texto para que pongas la clave
    const pass = prompt("Ingrese la clave de administrador:");
    
    // 2. Verificamos si la clave es correcta
    // (Podés cambiar 'neuquen2026' por la que vos quieras)
    if (pass === 'neuquen2026') {
        alert("¡Acceso concedido! Modo edición activado.");
        
        // 3. Quitamos el 'hidden' para que el formulario aparezca
        document.getElementById('seccion-admin').classList.remove('hidden');
        
        // 4. Agregamos una marca al 'body' para que los botones de borrar se vean
        document.body.classList.add('admin-mode');
        
    } else {
        alert("Clave incorrecta. Acceso denegado.");
    }
}
        // Esta función crea tarjetas de mentira (esqueletos) para mostrar mientras cargan los datos reales
function mostrarEsqueletos() {
    const div = document.getElementById('lista');
    div.innerHTML = ''; // Borramos lo que haya (si había productos viejos, se van)
    
    // Usamos un bucle para crear 5 tarjetas iguales
    for (let i = 0; i < 5; i++) {
        div.innerHTML += `
            <div class="bg-white rounded-md overflow-hidden flex flex-col h-full border border-gray-100 animate-pulse">
                <div class="p-4 bg-gray-50 h-[180px] flex items-center justify-center">
                    <div class="skeleton w-full h-full"></div>
                </div>
                <div class="p-4 space-y-3 flex-grow">
                    <div class="skeleton h-3 w-3/4"></div> <div class="skeleton h-6 w-1/2"></div> <div class="skeleton h-3 w-full"></div> </div>
            </div>
        `;
    }
}

        async function cargar(cat = '', busqueda = '') {
    // 1. ANTES DE LLAMAR AL SERVIDOR: Mostramos los esqueletos
    mostrarEsqueletos();

    try {
        let url = `${API_URL}?`;
        if(cat) url += `categoria=${cat}&`;
        if(busqueda) url += `busqueda=${busqueda}`;

        // 2. DETALLE CLAVE: Esperamos 500ms (medio segundo)
        // Esto es para que el ojo humano llegue a ver la animación, 
        // ya que tu compu es demasiado rápida cargando.
        await new Promise(resolve => setTimeout(resolve, 500));

        const res = await fetch(url);
        const productos = await res.json();
        
        const div = document.getElementById('lista');
        
        // 3. IMPORTANTÍSIMO: Al llegar aquí, limpiamos los esqueletos 
        // para poner los productos reales.
        div.innerHTML = ''; 
        
        if(productos.length === 0) {
            div.innerHTML = `<div class="col-span-full py-20 text-center">No se encontraron productos.</div>`;
            return;
        }

        // 4. Dibujamos los productos de siempre
        productos.forEach(p => {
            const precioFormateado = new Intl.NumberFormat('es-AR', {
                style: 'currency', currency: 'ARS', minimumFractionDigits: 0
            }).format(p.precio);

            div.innerHTML += `
                <div onclick="verDetalle('${p.nombre.replace(/'/g, "\\'")}', ${p.precio}, '${p.imagen}', '${p.categoria}', '${p.descripcion.replace(/'/g, "\\'")}')" 
                     class="product-card bg-white rounded-md overflow-hidden flex flex-col h-full border border-transparent hover:border-gray-200 transition-all cursor-pointer group">
                    <div class="p-4 bg-white flex items-center justify-center">
                        <img src="${p.imagen}" class="product-img w-full" onerror="this.src='https://via.placeholder.com/150?text=Sin+Imagen'">
                    </div>
                    <div class="p-4 border-t border-gray-50 flex flex-col flex-grow">
                        <h3 class="text-[13px] font-light text-gray-600 truncate mb-1 group-hover:text-blue-500">${p.nombre}</h3>
                        <div class="flex flex-col">
                            <span class="text-2xl font-normal text-[#333] tracking-tight">${precioFormateado}</span>
                            <span class="text-[13px] text-[#00a650] font-semibold">Envío gratis ⚡</span>
                        </div>
                        <div class="mt-auto pt-4 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500 font-bold uppercase">${p.categoria}</span>
                            <button onclick="borrar(event, ${p.id})" class="text-gray-300 hover:text-red-500 transition-colors">🗑️</button>
                        </div>
                    </div>
                </div>`;
        });
    } catch (e) { 
        console.error("Error al cargar:", e); 
        document.getElementById('lista').innerHTML = "Error al conectar con el servidor.";
    }
}

        // LÓGICA DEL MODAL
        function verDetalle(nombre, precio, imagen, categoria, descripcion) {
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('modal-cat').innerText = categoria;
            document.getElementById('modal-desc').innerText = descripcion || 'Sin descripción adicional.';
            document.getElementById('modal-img').src = imagen;
            
            const precioFormateado = new Intl.NumberFormat('es-AR', {
                style: 'currency', currency: 'ARS', minimumFractionDigits: 0
            }).format(precio);
            document.getElementById('modal-precio').innerText = precioFormateado;

            const mensaje = `Hola! Me interesa este producto de la Feria: ${nombre} (${precioFormateado}). ¿Sigue disponible?`;
            document.getElementById('btn-whatsapp').href = `https://wa.me/5492990000000?text=${encodeURIComponent(mensaje)}`;

            document.getElementById('modal-detalle').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-detalle').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            cargar(categoriaActual, e.target.value);
        });

        function seleccionarCategoria(cat) {
            categoriaActual = cat;
            document.getElementById('buscador').value = '';
            cargar(cat);
        }

        function resetPagina() {
            categoriaActual = '';
            document.getElementById('buscador').value = '';
            cargar();
        }

        async function guardar() {
            const btn = event.target;
            const n = document.getElementById('nombre').value;
            const p = document.getElementById('precio').value;
            const c = document.getElementById('categoria').value;
            const d = document.getElementById('descripcion').value; // Nueva descripción
            const archivoInput = document.getElementById('archivo');

            if(!n || !p || !archivoInput.files[0]) return alert("Completá nombre, precio e imagen.");

            btn.innerText = "Publicando...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('nombre', n);
            formData.append('descripcion', d || "Sin descripción"); // Enviamos la descripción real
            formData.append('precio', p);
            formData.append('categoria', c);
            formData.append('archivo', archivoInput.files[0]);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: formData });
                if(res.ok) {
                    cargar(categoriaActual); 
                    document.getElementById('nombre').value = '';
                    document.getElementById('precio').value = '';
                    document.getElementById('descripcion').value = '';
                    archivoInput.value = '';
                    alert("¡Publicado!");
                }
            } catch (e) { alert("Error."); }
            finally {
                btn.innerText = "Publicar ahora";
                btn.disabled = false;
            }
        }

       async function borrar(event, id) {
    event.stopPropagation(); 

    // --- ESTA ES LA LÍNEA DE SEGURIDAD ---
    const confirmar = confirm("⚠️ ¿Estás seguro de que querés eliminar este producto? Esta acción no se puede deshacer.");
    if (!confirmar) return; // Si el usuario toca "Cancelar", la función se corta acá.

    try {
        const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if (res.ok) {
            alert("Producto eliminado correctamente.");
            cargar(categoriaActual);
        }
    } catch (e) { 
        alert("Hubo un error al intentar borrar."); 
    }
}
        window.onload = () => cargar();
    </script>
</body>
</html>
