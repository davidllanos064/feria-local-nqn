<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-indigo-700 p-6 flex justify-between items-center text-white">
        <h1 class="text-2xl font-black cursor-pointer" onclick="location.reload()">FERIA NEUQUÉN</h1>
        <input type="text" id="buscador" oninput="filtrar()" placeholder="Buscar..." class="p-2 rounded-full text-black px-4">
    </nav>

    <div class="p-6 flex gap-2 overflow-x-auto border-b bg-white">
        <button onclick="cargar()" class="bg-indigo-600 text-white px-4 py-2 rounded-full font-bold">Todas</button>
        <button onclick="cargar('Tecnología')" class="bg-white border px-4 py-2 rounded-full font-bold">Tecnología</button>
        <button onclick="cargar('Hogar')" class="bg-white border px-4 py-2 rounded-full font-bold">Hogar</button>
    </div>

    <div id="lista" class="grid grid-cols-1 md:grid-cols-4 gap-6 p-6"></div>

    <script>
        async function cargar(cat = '') {
            let url = cat ? `/productos?categoria=${cat}` : '/productos';
            const res = await fetch(url);
            const prods = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = prods.map(p => `
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="font-bold">${p.nombre}</h3>
                    <p class="text-indigo-600 font-bold">$${p.precio}</p>
                </div>`).join('');
        }
        function filtrar() {
            const val = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.bg-white').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        }
        window.onload = () => cargar();
    </script>
</body>
</html>
