<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --morado-principal: #4f46e5;
            --morado-oscuro: #3730a3;
            --amarillo-opaco: #eab308;
        }
        body { font-family: 'Proxima Nova', sans-serif; scroll-behavior: smooth; }
        .product-card:hover { 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2); 
            transform: translateY(-4px);
        }
        .product-img { height: 180px; object-fit: contain; padding: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .admin-trigger {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 60;
        }

        .titulo-remarcado {
            color: rgba(31, 41, 55, 0.9);
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .subtitulo-opaco {
            color: rgba(107, 114, 128, 0.6);
            font-weight: 700;
        }
        .miniatura-activa { border-color: #4f46e5 !important; opacity: 1 !important; }
        .miniatura { opacity: 0.6; transition: all 0.2s; }
        .miniatura:hover { opacity: 1; }

        .btn-adopcion {
            background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
            animation: pulse-pink 2s infinite;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes pulse-pink {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(219, 39, 119, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); }
        }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1f2937]">

    <button onclick="reproducirSonido('click'); loginAdmin()" class="admin-trigger group flex items-center gap-2 bg-white/80 backdrop-blur-sm p-2 px-3 rounded-full shadow-md hover:bg-white transition-all border border-gray-200" title="Panel de Control">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600 group-hover:rotate-12 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500 group-hover:text-indigo-600">Admin</span>
    </button>

    <nav class="bg-indigo-700 pt-6 pb-2 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-4">
                <div class="flex-shrink-0 cursor-pointer text-center md:text-left" onclick="reproducirSonido('click'); resetPagina()">
                    <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-tight">
                        Mercado <br>
                        <span class="text-yellow-400 text-xs font-bold tracking-[0.3em] uppercase opacity-90">Feria Neuquén</span>
                    </h1>
                </div>
                <div class="flex-grow max-w-2xl w-full relative">
                    <input type="text" id="buscador" placeholder="Busca artesanías, tecnología y más..." 
                        class="w-full py-3 px-5 rounded-full shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 border-none bg-indigo-600/50 text-white placeholder-indigo-200">
                    <button class="absolute right-5 top-3.5 text-indigo-200">🔍</button>
                </div>
            </div>
            
            <div class="flex justify-start md:justify-center items-center gap-4 overflow-x-auto hide-scroll pb-2">
                <button onclick="reproducirSonido('click'); resetPagina()" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Todo</button>
                <button onclick="reproducirSonido('click'); seleccionarCategoria('Tecnología')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Tech</button>
                <button onclick="reproducirSonido('click'); seleccionarCategoria('Hogar')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Hogar</button>
                <button onclick="reproducirSonido('click'); seleccionarCategoria('Moda')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Moda</button>
                <button onclick="reproducirSonido('click'); seleccionarCategoria('Mascotas')" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md hover:bg-indigo-600 transition-all">Mascotas</button>
                
                <a href="https://petneuquen.streamlit.app/" target="_blank" class="text-[11px] text-white font-black uppercase tracking-wider px-4 py-2 rounded-full btn-adopcion transition-all shadow-md">
                    🐾 ADOPCIÓN
                </a>
                <button onclick="abrirRegistro()" class="text-[11px] text-indigo-100 font-bold uppercase tracking-wider hover:text-white px-3 py-1 rounded-md border border-indigo-400 hover:bg-indigo-600 transition-all ml-2">
                    👤 Mi Cuenta
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-6">
        <button onclick="abrirRegistro()" class="group block w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black text-center py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg transition-all transform hover:scale-[1.01]">
            🚀 ¿Querés vender tus productos acá? Unite a la Feria hoy mismo
        </button>
    </div>

    <div class="container mx-auto px-4 max-w-6xl mt-10">
        <div id="seccion-admin" class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-2 border-indigo-50 hidden">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-indigo-900">
                <span class="bg-indigo-100 p-2 rounded-lg">🛠️</span> Panel de Administración
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Nombre del Producto / Mascota</label>
                    <input id="nombre" type="text" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 transition">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Categoría</label>
                    <select id="categoria" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 bg-white">
                        <option value="Tecnología">Tecnología</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Adopción">🐾 Adopción Responsable</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Precio (0 si es Adopción)</label>
                    <input id="precio" type="number" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400">
                </div>
                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Fotos (Según tu plan)</label>
                    <input id="archivos" type="file" accept="image/*" multiple class="w-full border-2 border-dashed border-gray-200 p-4 rounded-xl text-sm">
                </div>
                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Descripción / Historia</label>
                    <textarea id="descripcion" rows="3" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400"></textarea>
                </div>
                <div class="md:col-span-4 flex justify-end pt-4">
                    <button onclick="guardar()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-xl transition shadow-lg transform hover:-translate-y-1">
                        Publicar Ahora
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-10">
            <h2 id="titulo-seccion" class="text-5xl titulo-remarcado">Productos</h2>
            <p class="text-2xl subtitulo-opaco mt-[-5px]">y oportunidades</p>
        </div>
        
        <div id="lista" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-24"></div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-indigo-900/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-[32px] overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
            <div class="md:w-1/2 bg-gray-50 p-6 flex flex-col justify-center items-center border-r relative">
                <button onclick="cerrarModal()" class="absolute top-4 left-4 md:hidden text-gray-400 text-2xl">✕</button>
                <img id="modal-img-principal" src="" class="max-h-[350px] object-contain drop-shadow-xl transition-all duration-300">
                <div id="galeria-miniaturas" class="flex gap-2 mt-6 overflow-x-auto p-2 w-full justify-center"></div>
            </div>
            <div class="md:w-1/2 p-10 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-start mb-4">
                    <span id="modal-cat" class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest"></span>
                    <button onclick="cerrarModal()" class="hidden md:block text-gray-400 hover:text-black text-2xl transition">✕</button>
                </div>
                <h2 id="modal-nombre" class="text-4xl font-black text-gray-900 leading-tight mb-2"></h2>
                <p id="modal-precio" class="text-3xl font-light text-indigo-600 mb-6"></p>
                <div class="bg-gray-50 p-4 rounded-2xl mb-6">
                    <p id="modal-desc" class="text-gray-600 leading-relaxed text-sm"></p>
                </div>
                <div class="border-t pt-6 space-y-4">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center font-bold text-white text-xl shadow-lg" id="vendedor-inicial">F</div>
                        <div>
                            <p class="text-sm font-black text-gray-900" id="vendedor-nombre"></p>
                            <p class="text-xs text-gray-500" id="vendedor-ubicacion"></p>
                        </div>
                    </div>
                    <a id="btn-whatsapp" target="_blank" onclick="reproducirSonido('click')" class="flex items-center justify-center gap-3 bg-[#25D366] text-white py-4 rounded-2xl font-bold hover:scale-[1.02] transition shadow-lg">
                        <span id="txt-boton-contacto">💬 Contactar</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-registro" class="fixed inset-0 bg-indigo-950/90 backdrop-blur-xl z-[150] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[32px] overflow-hidden shadow-2xl flex flex-col max-h-[95vh]">
            <div class="p-8 overflow-y-auto">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-gray-900">Creá tu Cuenta</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <input id="reg-nombre" type="text" placeholder="Nombre completo" class="bg-gray-50 border-2 p-3 rounded-2xl outline-none">
                    <select id="reg-tipo" class="bg-gray-50 border-2 p-3 rounded-2xl outline-none" onchange="alternarCamposRegistro()">
                        <option value="comprador">🛍️ Comprador</option>
                        <option value="vendedor">💰 Vendedor</option>
                    </select>
                    <input id="reg-email" type="email" placeholder="tu@email.com" class="bg-gray-50 border-2 p-3 rounded-2xl outline-none">
                    <div id="campo-whatsapp" style="display:none;"><input id="reg-whatsapp" type="text" placeholder="549299..." class="w-full bg-gray-50 border-2 p-3 rounded-2xl outline-none"></div>
                    <input id="reg-pass" type="password" placeholder="Contraseña" class="md:col-span-2 bg-gray-50 border-2 p-3 rounded-2xl outline-none">
                </div>
                <div id="btn-registro-comprador">
                    <button onclick="registrarUsuario('comprador')" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl">Crear Cuenta</button>
                </div>
                <div id="seccion-planes-vendedor" style="display:none;" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="border-2 p-6 rounded-[32px] text-center">
                        <h3 class="font-bold">Plan Básico</h3>
                        <p class="text-2xl font-black my-2">$15.000</p>
                        <button onclick="registrarUsuario('vendedor', 'Basico')" class="w-full bg-indigo-100 text-indigo-600 py-2 rounded-xl mt-4">Elegir Básico</button>
                    </div>
                    <div class="border-4 border-indigo-500 p-6 rounded-[32px] text-center bg-indigo-50">
                        <h3 class="font-bold">Plan Premium</h3>
                        <p class="text-2xl font-black my-2">$50.000</p>
                        <button onclick="registrarUsuario('vendedor', 'Premium')" class="w-full bg-indigo-600 text-white py-2 rounded-xl mt-4">Elegir Premium</button>
                    </div>
                </div>
            </div>
            <button onclick="cerrarRegistro()" class="p-4 text-gray-400 text-xs font-bold uppercase border-t">Cerrar</button>
        </div>
    </div>

    <div id="modal-login" class="fixed inset-0 bg-indigo-950/90 backdrop-blur-xl z-[150] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] overflow-hidden shadow-2xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-gray-900">Ingresar</h2>
                <p class="text-gray-500 text-sm">Accede a tu panel de vendedor.</p>
            </div>
            <div class="space-y-4 mb-6">
                <input id="login-email" type="email" placeholder="Email" class="w-full bg-gray-50 border-2 p-3 rounded-2xl outline-none focus:border-indigo-500">
                <input id="login-pass" type="password" placeholder="Contraseña" class="w-full bg-gray-50 border-2 p-3 rounded-2xl outline-none focus:border-indigo-500">
            </div>
            <button onclick="iniciarSesion()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Entrar</button>
            <button onclick="cerrarLogin()" class="w-full mt-4 text-gray-400 text-xs font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <a href="https://wa.me/5492996256110" target="_blank" class="fixed bottom-6 right-6 z-50 bg-white p-3 rounded-full shadow-2xl border border-gray-100 hover:scale-110 transition-transform">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-10 h-10">
    </a>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
    const API_URL = '/productos'; 
    let categoriaActual = '';
    let isAdmin = false;

    function reproducirSonido(tipo) {
        const audio = document.getElementById(tipo === 'click' ? 'snd-click' : 'snd-success');
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio bloqueado"));
    }

    function abrirRegistro() {
        reproducirSonido('click');
        if(localStorage.getItem("usuario")) {
            window.location.href = "/dashboard";
        } else {
            const opcion = confirm("¿Ya tienes cuenta? Pulsa ACEPTAR para Ingresar o CANCELAR para registrarte.");
            if(opcion) {
                document.getElementById('modal-login').classList.remove('hidden');
            } else {
                document.getElementById('modal-registro').classList.remove('hidden');
            }
        }
    }

    function cerrarRegistro() { document.getElementById('modal-registro').classList.add('hidden'); }
    function cerrarLogin() { document.getElementById('modal-login').classList.add('hidden'); }

    function alternarCamposRegistro() {
        const tipo = document.getElementById('reg-tipo').value;
        const esVendedor = (tipo === 'vendedor');
        document.getElementById('campo-whatsapp').style.display = esVendedor ? 'block' : 'none';
        document.getElementById('seccion-planes-vendedor').style.display = esVendedor ? 'grid' : 'none';
        document.getElementById('btn-registro-comprador').style.display = esVendedor ? 'none' : 'block';
    }

    async function iniciarSesion() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-pass').value;
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);

        try {
            const res = await fetch('/login', { method: 'POST', body: formData });
            const data = await res.json();
            if (res.ok) {
                reproducirSonido('success');
                localStorage.setItem("usuario", JSON.stringify(data.usuario));
                window.location.href = "/dashboard";
            } else { alert(data.detail || "Error al ingresar"); }
        } catch (e) { alert("Error de conexión"); }
    }

    async function registrarUsuario(tipo, plan = 'gratis') {
        const nombre = document.getElementById('reg-nombre').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-pass').value;
        const whatsapp = document.getElementById('reg-whatsapp').value;

        if(!nombre || !email || !password || (tipo === 'vendedor' && !whatsapp)) {
            alert("Completa todos los campos."); return;
        }

        const formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('email', email);
        formData.append('password', password);
        formData.append('tipo', tipo);
        formData.append('whatsapp', whatsapp || '');
        formData.append('plan', plan);

        try {
            const res = await fetch('/registro', { method: 'POST', body: formData });
            if (res.ok) {
                reproducirSonido('success');
                if (tipo === 'vendedor') {
                    alert("Registro exitoso. Te redirigimos para activar el plan.");
                    window.location.href = `https://wa.me/5492996256110?text=Registro de ${nombre}`;
                } else {
                    alert("Cuenta creada. Ya podés ingresar.");
                    cerrarRegistro();
                    document.getElementById('modal-login').classList.remove('hidden');
                }
            } else { alert("Error en el registro."); }
        } catch (e) { alert("Error de conexión."); }
    }

    function loginAdmin() {
        const pass = prompt("Clave de Admin:");
        if (pass === 'neuquen2026') {
            isAdmin = true;
            document.getElementById('seccion-admin').classList.remove('hidden');
        }
    }

    async function cargar(cat = '', busqueda = '') {
        try {
            let url = `${API_URL}?`;
            if(cat) url += `categoria=${cat}&`;
            const res = await fetch(url);
            const productos = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = ''; 
            productos.forEach(p => {
                const esAdopcion = p.categoria === 'Adopción';
                const portada = p.imagenes_urls ? p.imagenes_urls.split(',')[0] : 'https://via.placeholder.com/300';
                const divProducto = document.createElement('div');
                divProducto.className = "product-card bg-white rounded-2xl overflow-hidden border border-gray-100 cursor-pointer";
                divProducto.onclick = () => verDetalle(p);
                divProducto.innerHTML = `
                    <div class="p-2 flex items-center justify-center bg-white"><img src="${portada}" class="product-img"></div>
                    <div class="p-5">
                        <h3 class="text-sm font-semibold truncate">${p.nombre}</h3>
                        <span class="text-xl font-bold">${esAdopcion ? 'Gratis' : '$' + p.precio}</span>
                    </div>`;
                div.appendChild(divProducto);
            });
        } catch (e) { console.error(e); }
    }

    function verDetalle(p) {
        document.getElementById('modal-nombre').innerText = p.nombre;
        document.getElementById('modal-desc').innerText = p.descripcion;
        document.getElementById('modal-img-principal').src = p.imagenes_urls.split(',')[0];
        document.getElementById('modal-detalle').classList.remove('hidden');
    }

    function cerrarModal() { document.getElementById('modal-detalle').classList.add('hidden'); }
    function seleccionarCategoria(cat) { categoriaActual = cat; cargar(cat); }
    function resetPagina() { categoriaActual = ''; cargar(); }
    window.onload = () => cargar();
    </script>
</body>
</html>
