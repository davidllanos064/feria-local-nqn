<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Feria Neuquén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --morado-principal: #4f46e5;
            --morado-oscuro: #3730a3;
            --amarillo-opaco: #eab308;
        }
        body { font-family: 'Proxima Nova', sans-serif; }
        .product-card:hover { 
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2); 
            transform: translateY(-4px);
        }
        .product-img { height: 180px; object-fit: contain; padding: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .skeleton { background-color: #e5e7eb; border-radius: 0.375rem; }

        /* Estilo para el botón de admin en la esquina */
        .admin-trigger {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 60;
        }
    </style>
</head>
<body class="bg-[#f3f4f6] text-[#1f2937]">

    <button onclick="loginAdmin()" class="admin-trigger group flex items-center gap-2 bg-white/80 backdrop-blur-sm p-2 px-3 rounded-full shadow-md hover:bg-white transition-all border border-gray-200" title="Panel de Control">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-600 group-hover:rotate-12 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="User5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-500 group-hover:text-indigo-600">Admin</span>
    </button>

    <nav class="bg-indigo-700 pt-6 pb-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-6xl">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex-shrink-0 cursor-pointer text-center md:text-left" onclick="resetPagina()">
                    <h1 class="text-white text-3xl font-extrabold tracking-tighter leading-tight">
                        Mercado <br>
                        <span class="text-yellow-400 text-xs font-bold tracking-[0.3em] uppercase opacity-90">Feria Neuquén</span>
                    </h1>
                </div>
                <div class="flex-grow max-w-2xl w-full relative">
                    <input type="text" id="buscador" placeholder="Busca artesanías, tecnología y más..." 
                        class="w-full py-3 px-5 rounded-full shadow-inner text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 border-none bg-indigo-600/50 text-white placeholder-indigo-200">
                    <button class="absolute right-5 top-3.5 text-indigo-200">🔍</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl mt-10">
        
        <div class="flex justify-start md:justify-center gap-8 mb-12 overflow-x-auto hide-scroll pb-4">
            <div onclick="seleccionarCategoria('Tecnología')" class="flex flex-col items-center gap-3 cursor-pointer group min-w-[80px]">
                <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center group-hover:bg-indigo-50 group-hover:scale-110 transition-all text-2xl border border-indigo-100">📱</div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wide group-hover:text-indigo-600">Tech</span>
            </div>
            <div onclick="seleccionarCategoria('Vehículos')" class="flex flex-col items-center gap-3 cursor-pointer group min-w-[80px]">
                <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center group-hover:bg-indigo-50 group-hover:scale-110 transition-all text-2xl border border-indigo-100">🚗</div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wide group-hover:text-indigo-600">Autos</span>
            </div>
            <div onclick="seleccionarCategoria('Hogar')" class="flex flex-col items-center gap-3 cursor-pointer group min-w-[80px]">
                <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center group-hover:bg-indigo-50 group-hover:scale-110 transition-all text-2xl border border-indigo-100">🏠</div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wide group-hover:text-indigo-600">Hogar</span>
            </div>
            <div onclick="seleccionarCategoria('Moda')" class="flex flex-col items-center gap-3 cursor-pointer group min-w-[80px]">
                <div class="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center group-hover:bg-indigo-50 group-hover:scale-110 transition-all text-2xl border border-indigo-100">👕</div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wide group-hover:text-indigo-600">Moda</span>
            </div>
            <div onclick="resetPagina()" class="flex flex-col items-center gap-3 cursor-pointer group min-w-[80px]">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl shadow-md flex items-center justify-center group-hover:bg-indigo-700 transition-all text-[10px] text-white font-black">ALL</div>
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wide">Todo</span>
            </div>
        </div>

        <div id="seccion-admin" class="bg-white p-8 rounded-2xl shadow-xl mb-12 border-2 border-indigo-50 hidden">
            <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-indigo-900">
                <span class="bg-indigo-100 p-2 rounded-lg">🛠️</span>
                Panel de Administración
                <span class="text-[10px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full border border-amber-200 uppercase tracking-widest">Modo Editor</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="md:col-span-2 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Nombre del Producto</label>
                    <input id="nombre" type="text" placeholder="Ej: Artesanía en madera de Roble" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 transition">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Categoría</label>
                    <select id="categoria" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400 bg-white">
                        <option value="Tecnología">Tecnología</option>
                        <option value="Vehículos">Vehículos</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Precio ARS</label>
                    <input id="precio" type="number" placeholder="$ 0.00" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400">
                </div>
                <div class="md:col-span-3 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Imagen del producto</label>
                    <input id="archivo" type="file" accept="image/*" class="w-full border-2 border-dashed border-gray-200 p-2 rounded-xl text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <div class="md:col-span-4 space-y-2">
                    <label class="text-xs font-black text-indigo-400 uppercase tracking-tighter">Descripción</label>
                    <textarea id="descripcion" rows="3" placeholder="Contanos más detalles sobre lo que vendés..." class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-indigo-400"></textarea>
                </div>
                <div class="md:col-span-4 flex justify-end pt-4">
                    <button onclick="guardar()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-xl transition shadow-lg hover:shadow-indigo-200 transform hover:-translate-y-1">
                        Publicar Producto
                    </button>
                </div>
            </div>
        </div>

        <h2 id="titulo-seccion" class="text-3xl font-bold mb-8 text-gray-800 tracking-tight">Lo último en la Feria</h2>
        
        <div id="lista" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-24"></div>
    </div>

    <div id="modal-detalle" class="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] overflow-hidden rounded-3xl shadow-2xl relative flex flex-col md:row">
            <button onclick="cerrarModal()" class="absolute top-5 right-5 text-gray-400 hover:text-indigo-600 z-10 p-2 bg-gray-100 rounded-full transition">✕</button>
            <div class="flex flex-col md:flex-row h-full">
                <div class="md:w-1/2 p-8 flex items-center justify-center bg-gray-50 border-r border-gray-100">
                    <img id="modal-img" src="" class="max-h-[450px] w-full object-contain drop-shadow-2xl">
                </div>
                <div class="md:w-1/2 p-10 flex flex-col">
                    <span id="modal-cat" class="inline-block text-[10px] bg-indigo-100 text-indigo-700 font-black uppercase tracking-[0.2em] mb-4 px-3 py-1 rounded-full w-fit"></span>
                    <h2 id="modal-nombre" class="text-3xl font-black text-gray-900 mb-2 leading-tight"></h2>
                    <p id="modal-desc" class="text-gray-500 text-sm mb-8 leading-relaxed"></p>
                    <div class="mt-auto">
                        <span id="modal-precio" class="block text-4xl font-light text-indigo-600 mb-8"></span>
                        <a id="btn-whatsapp" target="_blank" class="flex items-center justify-center gap-3 bg-[#128c7e] text-white py-4 rounded-2xl font-bold hover:bg-[#075e54] transition transform hover:scale-[1.02] shadow-xl">
                            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12.031 6.172c-2.32 0-4.525.812-6.21 2.289l.327.01c2.193.076 4.19.866 5.884 2.223a.44.44 0 0 1 .117.47.439.439 0 0 1-.397.288c-.027 0-.054 0-.08-.004-1.854-.23-3.56-.814-5.025-1.74a.438.438 0 0 1-.163-.565C8.04 6.643 9.944 6.172 12.031 6.172z"/></svg>
                            Hablar con el Vendedor
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = '/productos'; 
    let categoriaActual = '';

    function loginAdmin() {
        const pass = prompt("Acceso Restringido. Ingrese la clave:");
        if (pass === 'neuquen2026') {
            document.getElementById('seccion-admin').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('seccion-admin').offsetTop - 100, behavior: 'smooth' });
        } else {
            alert("Clave incorrecta.");
        }
    }

    function mostrarEsqueletos() {
        const div = document.getElementById('lista');
        div.innerHTML = ''; 
        for (let i = 0; i < 5; i++) {
            div.innerHTML += `
                <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 animate-pulse h-[320px]">
                    <div class="h-44 bg-gray-100"></div>
                    <div class="p-5 space-y-3">
                        <div class="skeleton h-3 w-3/4"></div> 
                        <div class="skeleton h-6 w-1/2"></div> 
                    </div>
                </div>`;
        }
    }

    async function cargar(cat = '', busqueda = '') {
        mostrarEsqueletos();
        try {
            let url = `${API_URL}?`;
            if(cat) url += `categoria=${cat}&`;
            if(busqueda) url += `busqueda=${busqueda}`;
            const res = await fetch(url);
            const productos = await res.json();
            const div = document.getElementById('lista');
            div.innerHTML = ''; 
            
            productos.forEach(p => {
                const precioFormateado = new Intl.NumberFormat('es-AR', {
                    style: 'currency', currency: 'ARS', minimumFractionDigits: 0
                }).format(p.precio);

                div.innerHTML += `
                    <div onclick="verDetalle('${p.nombre.replace(/'/g, "\\'")}', ${p.precio}, '${p.imagen}', '${p.categoria}', '${p.descripcion.replace(/'/g, "\\'")}')" 
                         class="product-card bg-white rounded-2xl overflow-hidden flex flex-col h-full border border-gray-100 transition-all cursor-pointer group">
                        <div class="p-2 flex items-center justify-center bg-white relative">
                            <span class="absolute top-3 left-3 text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase tracking-widest">${p.categoria}</span>
                            <img src="${p.imagen}" class="product-img w-full" onerror="this.src='https://via.placeholder.com/300?text=Feria+Neuquen'">
                        </div>
                        <div class="p-5 flex flex-col flex-grow bg-white">
                            <h3 class="text-sm font-semibold text-gray-500 truncate mb-1">${p.nombre}</h3>
                            <span class="text-2xl font-bold text-gray-900 tracking-tight mb-3">${precioFormateado}</span>
                            <div class="flex items-center justify-between mt-auto">
                                <span class="text-[10px] text-green-600 font-bold bg-green-50 px-2 py-1 rounded">ENVÍO GRATIS</span>
                                <button onclick="borrar(event, ${p.id})" class="text-gray-300 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        } catch (e) { 
            console.error("Error:", e); 
        }
    }

    async function guardar() {
        const btn = event.target;
        const n = document.getElementById('nombre').value;
        const p = document.getElementById('precio').value;
        const c = document.getElementById('categoria').value;
        const d = document.getElementById('descripcion').value; 
        const archivoInput = document.getElementById('archivo');

        if(!n || !p || !archivoInput.files[0]) return alert("Faltan datos obligatorios.");

        btn.innerText = "Subiendo..."; btn.disabled = true;
        const formData = new FormData();
        formData.append('nombre', n);
        formData.append('descripcion', d || "Sin descripción");
        formData.append('precio', p);
        formData.append('categoria', c);
        formData.append('imagen', archivoInput.files[0]);

        try {
            const res = await fetch(`${API_URL}/`, { method: 'POST', body: formData });
            if(res.ok) {
                alert("¡Producto en línea!");
                location.reload(); 
            }
        } catch (e) { alert("Error."); }
    }

    async function borrar(event, id) {
        event.stopPropagation(); 
        if (!confirm("¿Eliminar producto?")) return;
        const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        if (res.ok) cargar(categoriaActual);
    }

    function verDetalle(nombre, precio, imagen, categoria, descripcion) {
        document.getElementById('modal-nombre').innerText = nombre;
        document.getElementById('modal-cat').innerText = categoria;
        document.getElementById('modal-desc').innerText = descripcion || 'Este vendedor no agregó detalles.';
        document.getElementById('modal-img').src = imagen;
        const precioF = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(precio);
        document.getElementById('modal-precio').innerText = precioF;
        document.getElementById('btn-whatsapp').href = `https://wa.me/5492990000000?text=Hola! Me interesa: ${nombre}`;
        document.getElementById('modal-detalle').classList.remove('hidden');
    }

    function cerrarModal() { document.getElementById('modal-detalle').classList.add('hidden'); }
    function seleccionarCategoria(cat) { categoriaActual = cat; cargar(cat); }
    function resetPagina() { categoriaActual = ''; cargar(); }
    document.getElementById('buscador').addEventListener('input', (e) => cargar(categoriaActual, e.target.value));

    window.onload = () => cargar();
    </script>
</body>
</html>
