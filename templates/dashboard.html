<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Vendedor - Feria Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter text-xl">MI PANEL <span class="text-indigo-200">FERIA</span></h1>
            <button onclick="cerrarSesion()" class="text-xs bg-indigo-700 px-3 py-2 rounded-lg font-bold">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6 mt-4">
            <h2 class="text-2xl font-extrabold text-gray-800">¡Hola, <span id="user-name">Vendedor</span>! 👋</h2>
            <p class="text-gray-500 text-sm">Gestioná tus productos y datos de cobro desde acá.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <span class="bg-indigo-100 p-2 rounded-lg text-indigo-600">📦</span> Subir Nuevo Producto
                </h3>
                <div class="space-y-4">
                    <input id="p-nombre" type="text" placeholder="Nombre del producto" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-400">
                    <input id="p-precio" type="number" placeholder="Precio $" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-400">
                    
                    <select id="p-categoria" class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-400">
                        <option value="" disabled selected>Seleccioná una categoría</option>
                        <option value="Tecnología">Tecnología</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Moda">Moda</option>
                        <option value="Mascotas">Mascotas</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Electrodomésticos">Electrodomésticos</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Juguetes">Juguetes</option>
                        <option value="Belleza">Belleza</option>
                        <option value="Otros">Otros</option>
                    </select>

                    <textarea id="p-desc" placeholder="Descripción breve..." class="w-full p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-400"></textarea>
                    
                    <div class="border-2 border-dashed border-gray-200 p-4 rounded-xl text-center">
                        <p class="text-xs text-gray-400 mb-2">Subí hasta 3 fotos (Plan Básico)</p>
                        <input id="p-fotos" type="file" multiple accept="image/*" class="text-xs w-full">
                    </div>

                    <button onclick="subirProducto()" id="btn-subir" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Publicar Producto</button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-indigo-900 text-white p-6 rounded-3xl shadow-lg">
                    <h3 class="font-bold mb-4 flex items-center gap-2">💰 Datos de Cobro (CBU/Alias)</h3>
                    <div class="space-y-3">
                        <input id="v-cbu" type="text" placeholder="Tu CBU" class="w-full p-3 bg-indigo-800 rounded-xl border-none text-white placeholder-indigo-400">
                        <input id="v-alias" type="text" placeholder="Tu Alias" class="w-full p-3 bg-indigo-800 rounded-xl border-none text-white placeholder-indigo-400">
                        <button onclick="guardarPagos()" class="w-full bg-yellow-400 text-yellow-900 font-bold py-2 rounded-xl text-sm">Actualizar Datos</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h3 class="font-bold text-gray-700 mb-4">Mis Publicaciones</h3>
                    <div id="mis-productos" class="space-y-3 text-sm text-gray-500">
                        Cargando tus productos...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) { window.location.href = "/"; }
        document.getElementById('user-name').innerText = usuario.nombre;

        async function guardarPagos() {
            const formData = new FormData();
            formData.append('vendedor_id', parseInt(usuario.id));
            formData.append('cbu', document.getElementById('v-cbu').value);
            formData.append('alias', document.getElementById('v-alias').value);

            const res = await fetch('/vendedor/configurar-pagos', { method: 'POST', body: formData });
            if(res.ok) alert("¡Datos de cobro guardados!");
        }

        async function subirProducto() {
            const btn = document.getElementById('btn-subir');
            const nombre = document.getElementById('p-nombre').value;
            const precio = document.getElementById('p-precio').value;
            const categoria = document.getElementById('p-categoria').value;
            const fotos = document.getElementById('p-fotos').files;

            if(!nombre || !precio || !categoria || fotos.length === 0) {
                alert("Por favor completa nombre, precio, categoría y sube al menos una foto.");
                return;
            }

            btn.innerText = "Subiendo...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('vendedor_id', parseInt(usuario.id));
            formData.append('nombre', nombre);
            formData.append('precio', precio);
            formData.append('categoria', categoria);
            formData.append('descripcion', document.getElementById('p-desc').value);
            
            for(let i=0; i<fotos.length; i++) {
                formData.append('imagenes', fotos[i]);
            }

            try {
                // El error de conexión suele ser por timeout, intentamos con fetch estándar
                const res = await fetch('/productos', { 
                    method: 'POST', 
                    body: formData 
                });

                if(res.ok) {
                    alert("¡Producto publicado con éxito!");
                    location.reload();
                } else {
                    const error = await res.json();
                    alert("Error del servidor: " + (error.detail || "Consulta los logs"));
                }
            } catch(e) {
                console.error(e);
                alert("Error de conexión: Revisa si las fotos son muy pesadas o si el servidor está activo.");
            } finally {
                btn.innerText = "Publicar Producto";
                btn.disabled = false;
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('usuario');
            window.location.href = "/";
        }

        async function cargarMisProductos() {
            try {
                const res = await fetch('/productos');
                const todos = await res.json();
                const misProds = todos.filter(p => p.vendedor_id === usuario.id);
                const div = document.getElementById('mis-productos');
                
                if(misProds.length === 0) {
                    div.innerHTML = "Aún no tenés productos publicados.";
                    return;
                }

                div.innerHTML = misProds.map(p => `
                    <div class="flex justify-between items-center border-b pb-2">
                        <span>${p.nombre}</span>
                        <span class="font-bold text-indigo-600">$${p.precio}</span>
                    </div>
                `).join('');
            } catch(e) {
                document.getElementById('mis-productos').innerHTML = "Error al cargar productos.";
            }
        }

        cargarMisProductos();
    </script>
</body>
</html>
