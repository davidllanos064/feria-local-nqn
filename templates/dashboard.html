<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Vendedor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <nav class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black text-indigo-700">MI PANEL</h1>
        <button onclick="localStorage.removeItem('usuario'); location.href='/'" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">Salir</button>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="font-bold text-xl mb-4">Publicar Producto</h2>
            <input id="p-nombre" placeholder="Nombre" class="w-full p-3 mb-2 border rounded">
            <input id="p-precio" type="number" placeholder="Precio" class="w-full p-3 mb-2 border rounded">
            <input id="p-categoria" placeholder="Categoría" class="w-full p-3 mb-2 border rounded">
            <input id="p-fotos" type="file" multiple class="w-full mb-4">
            <button id="btn-subir" onclick="subirProducto()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Publicar</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="font-bold text-xl mb-4">Configurar Cobros</h2>
            <input id="v-cbu" placeholder="CBU" class="w-full p-3 mb-2 border rounded">
            <input id="v-alias" placeholder="Alias" class="w-full p-3 mb-2 border rounded">
            <button onclick="guardarPagos()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Guardar Datos</button>
        </div>
    </div>

    <script>
        const usuario = JSON.parse(localStorage.getItem('usuario'));
        if (!usuario) location.href = "/";

        async function subirProducto() {
            const formData = new FormData();
            formData.append('vendedor_id', usuario.id);
            formData.append('nombre', document.getElementById('p-nombre').value);
            formData.append('precio', document.getElementById('p-precio').value);
            formData.append('categoria', document.getElementById('p-categoria').value);
            const fotos = document.getElementById('p-fotos').files;
            for(let i=0; i<fotos.length; i++) formData.append('imagenes', fotos[i]);

            const res = await fetch('/productos', { method: 'POST', body: formData });
            if(res.ok) alert("¡Producto publicado!");
        }

        async function guardarPagos() {
            const formData = new FormData();
            formData.append('vendedor_id', usuario.id);
            formData.append('cbu', document.getElementById('v-cbu').value);
            formData.append('alias', document.getElementById('v-alias').value);
            
            await fetch('/vendedor/configurar-pagos', { method: 'POST', body: formData });
            alert("Datos actualizados");
        }
    </script>
</body>
</html>
